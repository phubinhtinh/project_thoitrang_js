services:
  # ─── Backend NestJS ───────────────────────────────────────────
  - type: web
    name: shopthoitrang-api
    runtime: node
    rootDir: back_end
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopthoitrang-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render tự sinh chuỗi bí mật

  # ─── Frontend React/Vite ──────────────────────────────────────
  - type: web
    name: shopthoitrang-web
    runtime: static
    rootDir: front_end
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: shopthoitrang-api
          type: web
          property: host
          render: https://$(host)

# ─── PostgreSQL Database ──────────────────────────────────────
databases:
  - name: shopthoitrang-db
    databaseName: shopthoitrang
    user: shopthoitrang_user
    plan: free
